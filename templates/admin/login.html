<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | emicyber</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a0a0e;
            --text-primary: #e6e6e6;
            --text-secondary: #c5cdd6;
            --text-muted: #8a8a90;
            --accent: #c00f23;
            --accent-hover: #db0321;
            --accent-glow: rgba(192, 15, 35, 0.3);
            --border: #2a1a1e;
            --border-light: rgba(255, 255, 255, 0.06);
            --success: #00c853;
            --error: #ff5252;
            --gradient: linear-gradient(135deg, #c00f23 0%, #ff613b 100%);
            --gradient-hover: linear-gradient(135deg, #db0321 0%, #ff4f20 100%);
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }
        .login-container {
            position: relative;
            z-index: 1;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header .logo {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.5px;
        }
        .login-header p { color: var(--text-muted); font-size: 0.85rem; margin-top: 8px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: var(--font-sans);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .btn-login {
            width: 100%;
            padding: 0.85rem;
            background: var(--gradient);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px var(--accent-glow);
            margin-top: 8px;
        }
        .btn-login:hover { background: var(--gradient-hover); transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }
        .flash { padding: 12px 16px; border-radius: 12px; font-size: 0.8rem; margin-bottom: 20px; }
        .flash.error { background: rgba(255,82,82,0.15); border: 1px solid rgba(255,82,82,0.3); color: var(--error); }
        .flash.success { background: rgba(0,200,83,0.15); border: 1px solid rgba(0,200,83,0.3); color: var(--success); }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">Emicyber</div>
            <p>Admin Panel — Sign in to manage your portfolio</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="admin">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>
    </div>
</body>
</html>
